<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mu Finance v04.06</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121418">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<script>
  // Registro do Service Worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('Service Worker registrado!', reg))
        .catch(err => console.log('Falha ao registrar SW', err));
    });
  }
</script>

<style>
    :root {
        --bg-main: #121418;
        --bg-card: #1E2128;
        --accent-blue: #38bdf8;
        --danger: #fb7185;
        --warning: #eab308;
        --success: #34d399;
        --accent-orange: #f97316;
    }
    
    /* VIEWPORT DINÂMICO */
    html, body { 
        height: 100vh; height: 100dvh; min-height: 100dvh; 
    }
    
    body { 
        background-color: #000; font-family: 'Inter', sans-serif; 
        -webkit-tap-highlight-color: transparent; color: white; 
        margin: 0; overflow: hidden;
    }
    
    /* CONTAINER PRINCIPAL */
    .app-container { 
        background-color: var(--bg-main); width: 100%; height: 100%; min-height: 100dvh;
        position: relative; display: flex; flex-direction: column;
    }
    
    /* HEADER - Mobile */
    header { flex-shrink: 0; padding: 10px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    
    /* MAIN - Área de conteúdo */
    main { 
        flex: 1; overflow-y: auto; overflow-x: hidden;
        padding-bottom: calc(130px + env(safe-area-inset-bottom));
        scroll-behavior: smooth;
    }
    
    .card { background-color: var(--bg-card); border: 1px solid rgba(255,255,255,0.05); }
    ::-webkit-scrollbar { display: none; }
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .sensitive-value.blurred { filter: blur(10px); transition: filter 0.3s ease; }
    
    /* OVERLAYS & BACKDROP */
    .overlay { 
        position: fixed; bottom: -100%; left: 0; width: 100%; height: 92%; 
        background-color: var(--bg-card); border-top-left-radius: 32px; border-top-right-radius: 32px; 
        z-index: 100; transition: bottom 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        box-shadow: 0 -10px 40px rgba(0,0,0,0.8); border-top: 1px solid rgba(255,255,255,0.1); 
        display: flex; flex-direction: column; 
    }
    .overlay.active { bottom: 0; }
    .overlay-content { flex: 1; overflow-y: auto; padding: 0 24px 40px 24px; }
    
    .backdrop { position: fixed; inset: 0; background-color: rgba(0,0,0,0.7); z-index: 90; display: none; }
    .backdrop.active { display: block; }

    .progress-ring__circle { transition: stroke-dashoffset 0.5s ease; transform: rotate(-90deg); transform-origin: 50% 50%; }
    .day-circle { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; position: relative; cursor: pointer; border: 1px solid #2d3139; color: #4b5563; font-weight: 700; transition: all 0.2s; }
    .day-circle.water-tracked { border-color: var(--accent-blue); color: var(--accent-blue); background: rgba(56, 189, 248, 0.05); }
    .day-circle.goal-met { background-color: var(--accent-blue); border-color: var(--accent-blue); color: #000; box-shadow: 0 0 15px rgba(56, 189, 248, 0.3); }
    
    /* NAVEGAÇÃO - Mobile (Sempre na base) */
    nav { 
        position: fixed; bottom: 0; left: 0; right: 0; width: 100%; 
        background-color: #16181D; border-top-left-radius: 32px; border-top-right-radius: 32px;
        display: flex; justify-content: space-between; align-items: center;
        padding: 5px 15px calc(15px + env(safe-area-inset-bottom)) 15px; 
        z-index: 80; box-shadow: 0 -10px 40px rgba(0,0,0,0.6); height: auto;
    }
    
    .nav-btn { 
        position: relative; display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
        color: #6b7280; border: none; background: none; cursor: pointer; flex: 1; transition: all 0.2s; padding-top: 15px; height: 100%;
    }
    
    .nav-btn.active { color: var(--accent-blue); }
    .nav-btn span { font-size: 10px; font-weight: 600; margin-top: 4px; }
    
    .active-indicator { position: absolute; top: 0; width: 22px; height: 3px; background-color: var(--accent-blue); border-radius: 4px; opacity: 0; transform: scaleX(0); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .nav-btn.active .active-indicator { opacity: 1; transform: scaleX(1); }
    
    .sidebar-toggle-btn { display: none; }
    .sidebar-profile { display: none; }
    .sidebar-logo-container { display: none; } /* Oculto no Mobile */

    /* NAVEGAÇÃO - Desktop (Sidebar Lateral) */
    @media (min-width: 768px) {
        header { margin-left: 260px; padding: 20px 30px; transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        main { margin-left: 260px; padding-bottom: 20px; transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .overlay { left: 260px; width: calc(100% - 260px); transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1), width 0.3s cubic-bezier(0.4, 0, 0.2, 1), bottom 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .backdrop { left: 260px; width: calc(100% - 260px); transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1), width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        /* Regras da Logo Desktop */
        .sidebar-logo-container { display: flex; margin-top: 50px; justify-content: center; }
        body.sidebar-collapsed .sidebar-logo-container { display: none !important; }

        nav {
            top: 0; bottom: 0; left: 0; right: auto; width: 260px; height: 100%; min-height: 100dvh;
            flex-direction: column; border-top-left-radius: 0; border-top-right-radius: 0;
            border-right: 1px solid rgba(255,255,255,0.05); 
            padding: 20px 16px; 
            justify-content: flex-start; align-items: stretch; border-top: none; 
            box-shadow: 10px 0 40px rgba(0,0,0,0.6);
            gap: 8px; 
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-x: hidden;
        }
        
        .sidebar-toggle-btn {
            display: flex; align-items: center; justify-content: center;
            background: none; border: none; color: #6b7280; cursor: pointer; outline: none;
            transition: all 0.2s ease;
            position: absolute; top: 15px; right: 15px; z-index: 100;
            height: 40px; width: 40px; padding: 0; margin: 0;
        }
        .sidebar-toggle-btn:hover { color: white; background-color: rgba(255,255,255,0.05); border-radius: 8px; }
        
        .nav-btn { 
            flex: none; flex-direction: row; align-items: center; justify-content: flex-start; 
            padding: 0 16px; height: 44px; margin-bottom: 0; border-radius: 10px; 
            transition: all 0.2s ease; 
        }
        .nav-btn:hover { background-color: rgba(255,255,255,0.05); color: #ffffff; }
        .nav-btn.active { background-color: rgba(56, 189, 248, 0.08); color: var(--accent-blue); }
        .nav-btn span { margin-top: 0 !important; margin-left: 14px; font-size: 14px !important; font-weight: 600; white-space: nowrap; transition: opacity 0.2s; }
        
        .active-indicator { left: 0; top: 50%; transform: translateY(-50%) scaleY(0); width: 4px; height: 20px; border-radius: 0 4px 4px 0; }
        .nav-btn.active .active-indicator { transform: translateY(-50%) scaleY(1); }

        .sidebar-profile {
            display: flex; align-items: center; margin-top: auto; padding: 12px;
            border-radius: 12px; cursor: pointer; transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.05); background-color: rgba(255,255,255,0.02);
            white-space: nowrap; overflow: hidden;
        }
        .sidebar-profile:hover { background-color: rgba(255,255,255,0.05); }
        .sidebar-avatar { width: 38px; height: 38px; border-radius: 50%; background-color: #1E2128; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; margin-right: 12px; flex-shrink: 0; border: 2px solid rgba(255,255,255,0.1); }
        .sidebar-user-info { display: flex; flex-direction: column; overflow: hidden; transition: opacity 0.2s; }
        .sidebar-user-info span:first-child { font-size: 13px; font-weight: 700; color: white; overflow: hidden; text-overflow: ellipsis; }
        .sidebar-user-info span:last-child { font-size: 9px; font-weight: 700; color: #6b7280; text-transform: uppercase; }

        /* MODO RETRÁTIL (Sidebar Collapsed) */
        body.sidebar-collapsed header, body.sidebar-collapsed main { margin-left: 80px; }
        body.sidebar-collapsed .overlay, body.sidebar-collapsed .backdrop { left: 80px; width: calc(100% - 80px); }
        body.sidebar-collapsed nav { width: 80px; padding-left: 12px; padding-right: 12px; }
        body.sidebar-collapsed .nav-btn { justify-content: center; padding: 0; width: 56px; }
        body.sidebar-collapsed .nav-btn span, body.sidebar-collapsed .sidebar-user-info { opacity: 0; width: 0; visibility: hidden; display: none; }
        body.sidebar-collapsed .sidebar-profile { padding: 12px 0; justify-content: center; border-color: transparent; background-color: transparent; }
        body.sidebar-collapsed .sidebar-avatar { margin-right: 0; }
    }
    
    /* FAB - Mobile */
    .fab-wrapper { position: relative; display: flex; justify-content: center; width: 70px; margin-top: -35px; }
    @media (min-width: 768px) { .fab-wrapper { display: none; } }
    
    .fab-container { position: relative; }
    .main-fab { background-color: var(--accent-blue); color: #000; width: 56px; height: 56px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 5px 20px rgba(56,189,248,0.4); z-index: 85; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; border: none; outline: none; }
    .fab-container.active .main-fab { transform: rotate(45deg); }
    .sub-fab { position: absolute; top: 4px; left: 4px; width: 48px; height: 48px; border-radius: 50%; display: flex; justify-content: center; align-items: center; z-index: 84; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; border: none; outline: none; }
    .sub-fab-fin { background-color: #a855f7; color: #000; transform: translateY(0); }
    .sub-fab-veh { background-color: #f97316; color: #000; transform: translateY(0); }
    .fab-container.active .sub-fab-fin { transform: translateY(-65px); }
    .fab-container.active .sub-fab-veh { transform: translateY(-130px); }
</style>
</head>
<body>
    <div id="app-container" class="app-container">
        <div id="splash-screen" class="fixed inset-0 bg-[#121418] z-[10000] flex flex-col items-center justify-center transition-opacity duration-500">
            <svg width="50" height="50" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M50 0C22.3858 0 0 22.3858 0 50C0 77.6142 22.3858 100 50 100C77.6142 100 100 77.6142 100 50C100 22.3858 77.6142 0 50 0ZM50 8.33333C73.0124 8.33333 91.6667 26.9876 91.6667 50C91.6667 73.0124 73.0124 91.6667 50 91.6667C26.9876 91.6667 8.33333 73.0124 8.33333 50C8.33333 26.9876 26.9876 8.33333 50 8.33333Z" fill="url(#paint0_linear_1_2)"/><path d="M50 16.6667C31.5905 16.6667 16.6667 31.5905 16.6667 50C16.6667 68.4095 31.5905 83.3333 50 83.3333C68.4095 83.3333 83.3333 68.4095 83.3333 50C83.3333 31.5905 68.4095 16.6667 50 16.6667ZM65.5833 40.8333L46.75 62.5C45.9167 63.4167 44.5833 63.5 43.5833 62.75L34.4167 55.4167C33.25 54.5 33.1667 52.8333 34.25 51.8333C35.25 50.9167 36.8333 51 37.8333 51.9167L44.5833 57.25L62.1667 36.5833C63.0833 35.5833 64.6667 35.5833 65.6667 36.5C66.5833 37.4167 66.5 39.8333 65.5833 40.8333Z" fill="url(#paint1_linear_1_2)"/><defs><linearGradient id="paint0_linear_1_2" x1="50" y1="0" x2="50" y2="100" gradientUnits="userSpaceOnUse"><stop stop-color="#38bdf8"/><stop offset="1" stop-color="#1d4ed8"/></linearGradient><linearGradient id="paint1_linear_1_2" x1="50" y1="16.6667" x2="50" y2="63.5" gradientUnits="userSpaceOnUse"><stop stop-color="#38bdf8"/><stop offset="1" stop-color="#1d4ed8"/></linearGradient></defs></svg>
            <p class="mt-4 text-lg font-bold text-gray-400">Mu Finance</p>
        </div>

        <div id="backdrop" class="backdrop"></div>

        <nav>
            <button class="sidebar-toggle-btn" onclick="toggleSidebar()"><i data-lucide="panel-left-close"></i></button>
            <div class="sidebar-logo-container">
                <svg width="30" height="30" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M50 0C22.3858 0 0 22.3858 0 50C0 77.6142 22.3858 100 50 100C77.6142 100 100 77.6142 100 50C100 22.3858 77.6142 0 50 0ZM50 8.33333C73.0124 8.33333 91.6667 26.9876 91.6667 50C91.6667 73.0124 73.0124 91.6667 50 91.6667C26.9876 91.6667 8.33333 73.0124 8.33333 50C8.33333 26.9876 26.9876 8.33333 50 8.33333Z" fill="url(#paint0_linear_1_2)"/><path d="M50 16.6667C31.5905 16.6667 16.6667 31.5905 16.6667 50C16.6667 68.4095 31.5905 83.3333 50 83.3333C68.4095 83.3333 83.3333 68.4095 83.3333 50C83.3333 31.5905 68.4095 16.6667 50 16.6667ZM65.5833 40.8333L46.75 62.5C45.9167 63.4167 44.5833 63.5 43.5833 62.75L34.4167 55.4167C33.25 54.5 33.1667 52.8333 34.25 51.8333C35.25 50.9167 36.8333 51 37.8333 51.9167L44.5833 57.25L62.1667 36.5833C63.0833 35.5833 64.6667 35.5833 65.6667 36.5C66.5833 37.4167 66.5 39.8333 65.5833 40.8333Z" fill="url(#paint1_linear_1_2)"/><defs><linearGradient id="paint0_linear_1_2" x1="50" y1="0" x2="50" y2="100" gradientUnits="userSpaceOnUse"><stop stop-color="#38bdf8"/><stop offset="1" stop-color="#1d4ed8"/></linearGradient><linearGradient id="paint1_linear_1_2" x1="50" y1="16.6667" x2="50" y2="63.5" gradientUnits="userSpaceOnUse"><stop stop-color="#38bdf8"/><stop offset="1" stop-color="#1d4ed8"/></linearGradient></defs></svg>
            </div>
            <button id="btn-dash" class="nav-btn active" onclick="switchView('dash')"><div class="active-indicator"></div><i data-lucide="layout-dashboard"></i><span>Dashboard</span></button>
            <button id="btn-fin" class="nav-btn" onclick="switchView('fin')"><div class="active-indicator"></div><i data-lucide="piggy-bank"></i><span>Financeiro</span></button>
            <div class="fab-wrapper">
                <div id="fab-container" class="fab-container">
                    <button class="main-fab" onclick="toggleFab()"><i data-lucide="plus"></i></button>
                    <button class="sub-fab sub-fab-fin" onclick="openFinModal('despesa')"><i data-lucide="arrow-down"></i></button>
                    <button class="sub-fab sub-fab-veh" onclick="openVehModal('abastecer')"><i data-lucide="fuel"></i></button>
                </div>
            </div>
            <button id="btn-veh" class="nav-btn" onclick="switchView('veh')"><div class="active-indicator"></div><i data-lucide="car"></i><span>Veículo</span></button>
            <button id="btn-cfg" class="nav-btn" onclick="switchView('cfg')"><div class="active-indicator"></div><i data-lucide="settings"></i><span>Ajustes</span></button>
            <div class="sidebar-profile" onclick="openCfgModal('profile')">
                <div id="sidebar-avatar" class="sidebar-avatar"></div>
                <div class="sidebar-user-info">
                    <span id="sidebar-username"></span>
                    <span id="sidebar-user-handle"></span>
                </div>
            </div>
        </nav>

        <header class="flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div id="header-avatar-container" class="md:hidden">
                    <img id="header-avatar" class="w-8 h-8 rounded-full cursor-pointer" onclick="openCfgModal('profile')">
                </div>
                <div>
                    <h1 id="header-title" class="text-lg font-bold">Dashboard</h1>
                    <p id="header-subtitle" class="text-xs text-gray-400">Visão geral</p>
                </div>
            </div>
            <div class="flex items-center space-x-2">
                <button id="btn-show-sensitive" class="w-8 h-8 flex items-center justify-center rounded-lg text-gray-400 hover:bg-white/5" onclick="toggleSensitive()"><i data-lucide="eye"></i></button>
                <button class="w-8 h-8 flex items-center justify-center rounded-lg text-gray-400 hover:bg-white/5"><i data-lucide="bell"></i></button>
            </div>
        </header>

        <main>
            <div id="view-dash" class="p-5 space-y-5 fade-in">
                <!-- Conteúdo do Dashboard -->
            </div>

            <div id="view-fin" class="p-5 space-y-5 hidden fade-in">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="card p-4 rounded-2xl">
                        <div class="flex justify-between items-center mb-2">
                            <h3 class="text-sm font-bold text-gray-300 uppercase tracking-widest">Balanço Mensal</h3>
                            <span id="fin-month-label" class="text-xs font-bold text-gray-500"></span>
                        </div>
                        <p class="text-3xl font-black sensitive-value" id="fin-balance">R$ 0,00</p>
                        <div class="flex justify-between text-xs mt-2">
                            <div class="text-green-400"><span class="font-bold">Receitas:</span> <span id="fin-revenues" class="sensitive-value">R$ 0,00</span></div>
                            <div class="text-red-400"><span class="font-bold">Despesas:</span> <span id="fin-expenses" class="sensitive-value">R$ 0,00</span></div>
                        </div>
                    </div>
                    <div class="card p-4 rounded-2xl">
                        <div class="flex justify-between items-center mb-2">
                            <h3 class="text-sm font-bold text-gray-300 uppercase tracking-widest">Contas</h3>
                            <button class="text-xs font-bold text-sky-400" onclick="openFinModal('conta')">+ Nova Conta</button>
                        </div>
                        <div id="fin-accounts-list" class="space-y-2"></div>
                    </div>
                </div>
                <div>
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-sm font-bold text-gray-300 uppercase tracking-widest">Extrato</h3>
                        <div class="flex items-center space-x-2">
                            <button class="text-gray-400 hover:text-white" onclick="setFinMonth(-1)"><i data-lucide="chevron-left"></i></button>
                            <span id="fin-current-month-year" class="text-sm font-bold text-gray-300"></span>
                            <button class="text-gray-400 hover:text-white" onclick="setFinMonth(1)"><i data-lucide="chevron-right"></i></button>
                        </div>
                        <div class="flex space-x-2">
                            <button class="text-xs font-bold px-3 py-1 rounded-lg bg-sky-500/10 text-sky-400" onclick="openFinModal('receita')">+ Receita</button>
                            <button class="text-xs font-bold px-3 py-1 rounded-lg bg-red-500/10 text-red-400" onclick="openFinModal('despesa')">+ Despesa</button>
                        </div>
                    </div>
                    <div id="fin-transactions" class="space-y-3"></div>
                </div>
            </div>

            <div id="view-veh" class="p-5 space-y-5 hidden fade-in">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                    <div class="card p-4 rounded-2xl">
                        <h3 class="text-sm font-bold text-gray-300 uppercase tracking-widest mb-2">Odômetro</h3>
                        <p class="text-3xl font-black"><span id="veh-km">0</span> km</p>
                    </div>
                    <div class="card p-4 rounded-2xl">
                        <h3 class="text-sm font-bold text-gray-300 uppercase tracking-widest mb-2">Média de Consumo</h3>
                        <p class="text-3xl font-black"><span id="veh-avg-media">0.0</span> km/l</p>
                    </div>
                    <div class="card p-4 rounded-2xl">
                        <h3 class="text-sm font-bold text-gray-300 uppercase tracking-widest mb-2">Custo por Km</h3>
                        <p class="text-3xl font-black">R$ <span id="veh-cost-km">0.00</span></p>
                    </div>
                </div>
                <div>
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-sm font-bold text-gray-300 uppercase tracking-widest">Histórico</h3>
                        <div class="flex space-x-2">
                            <button class="text-xs font-bold px-3 py-1 rounded-lg bg-orange-500/10 text-orange-400" onclick="openVehModal('abastecer')">Abastecer</button>
                            <button class="text-xs font-bold px-3 py-1 rounded-lg bg-blue-500/10 text-blue-400" onclick="openVehModal('servico')">Serviço</button>
                            <button class="text-xs font-bold px-3 py-1 rounded-lg bg-green-500/10 text-green-400" onclick="openVehModal('rota')">Nova Rota</button>
                        </div>
                    </div>
                    <div class="flex justify-center space-x-4 mb-4">
                            <button id="filter-veh-all" class="px-4 py-2 rounded-lg text-sm font-bold bg-gray-700 text-white" onclick="setVehView(\'all\')">Todos</button>
                            <button id="filter-veh-gastos" class="px-4 py-2 rounded-lg text-sm font-bold bg-gray-800 text-gray-400" onclick="setVehView(\'gastos\')">Gastos</button>
                            <button id="filter-veh-rotas" class="px-4 py-2 rounded-lg text-sm font-bold bg-gray-800 text-gray-400" onclick="setVehView(\'rotas\')">Rotas</button>
                        </div>
                    <div id="veh-timeline" class="space-y-3"></div>
                </div>
            </div>

            <div id="view-cfg" class="p-5 space-y-8 hidden fade-in">
                <div>
                    <h3 class="text-sm font-bold text-gray-300 uppercase tracking-widest mb-3">Geral</h3>
                    <div class="card p-4 rounded-2xl space-y-4">
                        <div class="flex items-center justify-between">
                            <label for="cfg-dark-mode" class="font-bold">Modo Escuro</label>

                        <input type="text" id="input-profile-name" class="w-full bg-transparent border-b-2 border-gray-600 focus:border-sky-400 outline-none py-2 text-lg font-bold">
                    </div>

                        <button type="button" class="w-full py-3 rounded-lg bg-gray-700 font-bold" onclick="closeCfgModal()">Cancelar</button>

                    <div class="bg-gray-800 p-4 rounded-lg max-w-sm w-full">
                        <h3 class="text-lg font-bold mb-4">Editar Avatar</h3>
                        <div><img id="avatar-editor-image" src="" alt="Avatar"></div>
                        <div class="flex justify-end space-x-2 mt-4">
                            <button onclick="cancelAvatarEdit()" class="px-4 py-2 rounded bg-gray-600">Cancelar</button>
                            <button onclick="cropAndSaveAvatar()" class="px-4 py-2 rounded bg-sky-500 text-black">Salvar</button>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const state = {
            currentView: 'dash',
            showSensitive: false,
            sidebarCollapsed: false,
            fin: {
                currentMonth: new Date().getMonth(),
                currentYear: new Date().getFullYear(),
                transactions: [],
                accounts: [],
                categories: []
            },
            veiculo: {
                km: 0,
                historico: [],
                currentView: 'all' // Adiciona o estado para o filtro do histórico do veículo
            },
            user: {
                name: 'Usuário',
                avatar: ''
            },
            health: {
                water: { goal: 2000, progress: 0, history: {} },
                coffee: { goal: 400, progress: 0, history: {} }
            }
        };

        const avatarPresets = [
            'https://api.dicebear.com/7.x/fun-emoji/svg?seed=Felix&backgroundColor=38bdf8',
            'https://api.dicebear.com/7.x/fun-emoji/svg?seed=Aneka&backgroundColor=fb7185',
            'https://api.dicebear.com/7.x/fun-emoji/svg?seed=Leo&backgroundColor=f97316',
            'https://api.dicebear.com/7.x/fun-emoji/svg?seed=Zoey&backgroundColor=34d399',
            'https://api.dicebear.com/7.x/fun-emoji/svg?seed=Max&backgroundColor=a855f7',
            'https://api.dicebear.com/7.x/fun-emoji/svg?seed=Mia&backgroundColor=eab308',
            'https://api.dicebear.com/7.x/fun-emoji/svg?seed=Sam&backgroundColor=6366f1',
            'https://api.dicebear.com/7.x/fun-emoji/svg?seed=Jude&backgroundColor=475569'
        ];

        // --- INICIALIZAÇÃO ---
        function init() {
            loadState();
            renderDashboard();
            renderFinances();
            renderVehicle();
            renderConfig();
            updateUI();
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 500);
            }, 1000);
        }

        // --- PERSISTÊNCIA DE DADOS ---
        function saveState() {
            localStorage.setItem('muFinanceState', JSON.stringify(state));
        }

        function loadState() {
            const savedState = localStorage.getItem('muFinanceState');
            if (savedState) {
                Object.assign(state, JSON.parse(savedState));
                // Garantir que as datas sejam objetos Date
                state.fin.transactions.forEach(t => t.data = new Date(t.data));
            } else {
                // Valores Padrão se não houver estado salvo
                state.fin.categories = ['Moradia', 'Alimentação', 'Transporte', 'Lazer', 'Saúde', 'Educação', 'Salário'];
                state.fin.accounts = [{id: 1, nome: 'Carteira'}, {id: 2, nome: 'Banco'}];
            }
        }

        // --- CONTROLE DE UI ---
        function updateUI() {
            // Visibilidade das views
            ['dash', 'fin', 'veh', 'cfg'].forEach(view => {
                document.getElementById(`view-${view}`).style.display = state.currentView === view ? 'block' : 'hidden';
            });

            // Botões de navegação
            ['dash', 'fin', 'veh', 'cfg'].forEach(id => {
                document.getElementById(`btn-${id}`).classList.toggle('active', state.currentView === id);
            });

            // Título do Header
            const viewTitles = { dash: 'Dashboard', fin: 'Financeiro', veh: 'Veículo', cfg: 'Ajustes' };
            const viewSubtitles = { dash: 'Visão geral', fin: 'Balanço e extrato', veh: 'Consumo e histórico', cfg: 'Suas preferências' };
            document.getElementById('header-title').textContent = viewTitles[state.currentView];
            document.getElementById('header-subtitle').textContent = viewSubtitles[state.currentView];

            // Visibilidade de valores sensíveis
            document.querySelectorAll('.sensitive-value').forEach(el => {
                el.classList.toggle('blurred', !state.showSensitive);
            });
            document.querySelector('#btn-show-sensitive i').setAttribute('data-lucide', state.showSensitive ? 'eye-off' : 'eye');

            // Estado do sidebar (desktop)
            document.body.classList.toggle('sidebar-collapsed', state.sidebarCollapsed);
            document.querySelector('.sidebar-toggle-btn i').setAttribute('data-lucide', state.sidebarCollapsed ? 'panel-right-close' : 'panel-left-close');

            // Avatar do usuário
            const avatarUrl = state.user.avatar || 'https://api.dicebear.com/7.x/initials/svg?seed=' + state.user.name;
            document.getElementById('header-avatar').src = avatarUrl;
            document.getElementById('sidebar-avatar').style.backgroundImage = `url(${avatarUrl})`;
            document.getElementById('sidebar-avatar').style.backgroundSize = 'cover';
            document.getElementById('sidebar-username').textContent = state.user.name;
            document.getElementById('sidebar-user-handle').textContent = `@${state.user.name.toLowerCase().replace(/\s/g, '')}`;

            // Renderiza componentes específicos da view atual
            if (state.currentView === 'dash') renderDashboard();
            if (state.currentView === 'fin') renderFinances();
            if (state.currentView === 'veh') renderVehicle();
            if (state.currentView === 'cfg') renderConfig();

            lucide.createIcons();
        }

        window.switchView = (view) => {
            state.currentView = view;
            updateUI();
        }

        window.toggleSensitive = () => {
            state.showSensitive = !state.showSensitive;
            saveState();
            updateUI();
        }

        window.toggleSidebar = () => {
            state.sidebarCollapsed = !state.sidebarCollapsed;
            saveState();
            updateUI();
        }

        // --- FAB (Floating Action Button) ---
        window.toggleFab = () => {
            document.getElementById('fab-container').classList.toggle('active');
        }

        // --- RENDERIZAÇÃO DAS VIEWS ---
        function renderDashboard() {
            const dashView = document.getElementById('view-dash');
            // Limpa a view para evitar duplicatas
            dashView.innerHTML = '';

            // Seção de Boas-vindas
            const welcomeSection = document.createElement('div');
            welcomeSection.className = 'card p-4 rounded-2xl text-center';
            welcomeSection.innerHTML = `<h2 class="text-xl font-bold">Olá, ${state.user.name}!</h2><p class="text-sm text-gray-400">Como você está hoje?</p>`;
            dashView.appendChild(welcomeSection);

            // Seção de Saúde (Água e Café)
            const healthSection = document.createElement('div');
            healthSection.className = 'grid grid-cols-2 gap-5';
            healthSection.innerHTML = `
                <div class="card p-4 rounded-2xl">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="text-sm font-bold text-gray-300 uppercase tracking-widest">Água</h3>
                        <span class="text-xs font-bold text-sky-400">${(state.health.water.progress / 1000).toFixed(1)} / ${(state.health.water.goal / 1000).toFixed(1)} L</span>
                    </div>
                    <div class="relative w-full h-24 flex items-center justify-center">
                        <svg class="w-full h-full" viewBox="0 0 36 36">
                            <path class="text-gray-700" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-width="3"></path>
                            <path class="progress-ring__circle text-sky-400" id="water-progress-ring" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="100, 100" stroke-dashoffset="100"></path>
                        </svg>
                        <div class="absolute flex flex-col items-center">
                            <i data-lucide="glass-water" class="w-6 h-6 text-sky-400"></i>
                            <span id="water-progress-text" class="text-xs font-bold">0%</span>
                        </div>
                    </div>
                    <div class="flex justify-center space-x-2 mt-3">
                        <button class="w-8 h-8 rounded-full bg-gray-700" onclick="updateHealth('water', -250)">-</button>
                        <button class="w-8 h-8 rounded-full bg-sky-500 text-black" onclick="updateHealth('water', 250)">+</button>
                    </div>
                </div>
                <div class="card p-4 rounded-2xl">
                     <div class="flex justify-between items-center mb-3">
                        <h3 class="text-sm font-bold text-gray-300 uppercase tracking-widest">Café</h3>
                        <span class="text-xs font-bold text-amber-400">${state.health.coffee.progress} / ${state.health.coffee.goal} mg</span>
                    </div>
                    <div class="relative w-full h-24 flex items-center justify-center">
                        <svg class="w-full h-full" viewBox="0 0 36 36">
                            <path class="text-gray-700" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-width="3"></path>
                            <path class="progress-ring__circle text-amber-400" id="coffee-progress-ring" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="100, 100" stroke-dashoffset="100"></path>
                        </svg>
                        <div class="absolute flex flex-col items-center">
                            <i data-lucide="coffee" class="w-6 h-6 text-amber-400"></i>
                            <span id="coffee-progress-text" class="text-xs font-bold">0%</span>
                        </div>
                    </div>
                    <div class="flex justify-center space-x-2 mt-3">
                        <button class="w-8 h-8 rounded-full bg-gray-700" onclick="updateHealth('coffee', -100)">-</button>
                        <button class="w-8 h-8 rounded-full bg-amber-500 text-black" onclick="updateHealth('coffee', 100)">+</button>
                    </div>
                </div>
            `;
            dashView.appendChild(healthSection);

            // Calendário de Hábitos
            const calendarSection = document.createElement('div');
            calendarSection.className = 'card p-4 rounded-2xl';
            calendarSection.innerHTML = `<h3 class="text-sm font-bold text-gray-300 uppercase tracking-widest mb-4">Registro de Água</h3><div id="water-calendar" class="grid grid-cols-7 gap-2"></div>`;
            dashView.appendChild(calendarSection);

            updateHealthRings();
            renderWaterCalendar();
        }

        window.setFinMonth = (direction) => {
            let { currentMonth, currentYear } = state.fin;
            currentMonth += direction;
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            } else if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            }
            state.fin.currentMonth = currentMonth;
            state.fin.currentYear = currentYear;
            saveState();
            renderFinances();
            updateUI();
        }

        function renderFinances() {
            const { transactions, accounts, currentMonth, currentYear } = state.fin;
            const monthNames = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
            const monthYearLabel = `${monthNames[currentMonth]} ${currentYear}`;
            document.getElementById('fin-month-label').textContent = monthYearLabel.toUpperCase();
            document.getElementById('fin-current-month-year').textContent = monthYearLabel;

            const monthlyTransactions = transactions.filter(t => t.data.getMonth() === currentMonth && t.data.getFullYear() === currentYear);
            const revenues = monthlyTransactions.filter(t => t.tipo === 'receita' && t.pago).reduce((sum, t) => sum + t.valor, 0);
            const expenses = monthlyTransactions.filter(t => t.tipo === 'despesa' && t.pago).reduce((sum, t) => sum + t.valor, 0);
            const balance = revenues - expenses;

            document.getElementById('fin-balance').textContent = `R$ ${balance.toFixed(2)}`;
            document.getElementById('fin-revenues').textContent = `R$ ${revenues.toFixed(2)}`;
            document.getElementById('fin-expenses').textContent = `R$ ${expenses.toFixed(2)}`;
            document.getElementById('fin-current-month-year').textContent = monthYearLabel;

            // Renderizar lista de contas

            if (type === 'abastecer') {
                Object.assign(activity, {
                    preco: parseFloat(document.getElementById(\'input-fuel-price\').value),

                // Calcular média
                const lastFullTank = state.veiculo.historico.slice().reverse().find(h => h.tipo === 'abastecimento' && h.tanqueCheio && h.km < activity.km);
                if (lastFullTank && activity.tanqueCheio) {
                    const dist = activity.km - lastFullTank.km;
                    const liters = state.veiculo.historico.filter(h => h.km > lastFullTank.km && h.km <= activity.km && h.tipo === 'abastecimento').reduce((sum, h) => sum + h.litros, 0) - activity.litros; // Litros consumidos

        function updateHealthRings() {
            const waterPercent = Math.min(100, (state.health.water.progress / state.health.water.goal) * 100);
            const coffeePercent = Math.min(100, (state.health.coffee.progress / state.health.coffee.goal) * 100);
            
            const waterRing = document.getElementById('water-progress-ring');
            const coffeeRing = document.getElementById('coffee-progress-ring');
            
            waterRing.style.strokeDashoffset = 100 - waterPercent;
            coffeeRing.style.strokeDashoffset = 100 - coffeePercent;

            document.getElementById('water-progress-text').textContent = `${Math.round(waterPercent)}%`;
            document.getElementById('coffee-progress-text').textContent = `${Math.round(coffeePercent)}%`;
        }

        function renderWaterCalendar() {
            const calendarEl = document.getElementById('water-calendar');
            calendarEl.innerHTML = '';
            const today = new Date();
            const currentMonth = today.getMonth();
            const currentYear = today.getFullYear();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(currentYear, currentMonth, day);
                const dateString = date.toISOString().split('T')[0];
                const dayEl = document.createElement('div');
                dayEl.className = 'day-circle';
                dayEl.textContent = day;
                
                if (state.health.water.history[dateString]) {
                    dayEl.classList.add('water-tracked');
                    if (state.health.water.history[dateString] >= state.health.water.goal) {
                        dayEl.classList.add('goal-met');
                    }
                }
                if (day === today.getDate()) {
                    dayEl.style.borderColor = '#fff'; // Destaque para o dia atual
                }
                calendarEl.appendChild(dayEl);
            }
        }

        // --- IMPORT/EXPORT/RESET ---
        window.exportData = () => {
            const dataStr = JSON.stringify(state, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            const exportFileDefaultName = 'mu_finance_backup.json';
            let linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
        }

        window.importData = (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const importedState = JSON.parse(e.target.result);
                    if (confirm('Isso substituirá todos os seus dados atuais. Deseja continuar?')) {
                        Object.assign(state, importedState);
                        state.fin.transactions.forEach(t => t.data = new Date(t.data));
                        saveState();
                        init();
                        alert('Dados importados com sucesso!');
                    }
                } catch (error) {
                    alert('Erro ao importar o arquivo. Verifique se o formato é JSON válido.');
                }
            };
            reader.readAsDataURL(file);
        }

        window.resetData = () => {
            if (confirm('ATENÇÃO: Isso apagará TODOS os seus dados. Esta ação não pode ser desfeita. Deseja continuar?')) {
                localStorage.removeItem('muFinanceState');
                // Recarrega o estado inicial sem recarregar a página
                Object.assign(state, {
                    currentView: 'dash',
                    showSensitive: false,
                    sidebarCollapsed: false,
                    fin: {
                        currentMonth: new Date().getMonth(),
                        currentYear: new Date().getFullYear(),
                        transactions: [],
                        accounts: [{id: 1, nome: 'Carteira'}, {id: 2, nome: 'Banco'}],
                        categories: ['Moradia', 'Alimentação', 'Transporte', 'Lazer', 'Saúde', 'Educação', 'Salário']
                    },
                    veiculo: { km: 0, historico: [] },
                    user: { name: 'Usuário', avatar: '' },
                    health: { water: { goal: 2000, progress: 0, history: {} }, coffee: { goal: 400, progress: 0, history: {} } }
                });
                init();
                alert('Dados resetados com sucesso!');
            }
        }

        init();
    });
</script>
</body>
</html>
